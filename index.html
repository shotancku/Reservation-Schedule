<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>YQN Studio 班表</title>
<link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang TC","Microsoft JhengHei",sans-serif;
  background:#f5f0eb;color:#3a2e28;min-height:100vh;
  display:flex;justify-content:center;padding:1.5rem 0 4rem;
}
.wrap{width:100%;max-width:440px;padding:0 1rem;}

.header{text-align:center;margin-bottom:1.5rem;padding-top:0.5rem;}
.store-name{font-size:28px;font-family:'Dancing Script',cursive;font-weight:600;color:#3a2e28;}
.store-sub{font-size:12px;color:#b0a090;margin-top:4px;}

.nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;}
.nav-btn{background:#efe8e0;border:none;border-radius:8px;padding:8px 18px;font-size:14px;cursor:pointer;transition:background 0.15s;color:#3a2e28;}
.nav-btn:hover{background:#e0d4c8;}
.month-label{font-size:15px;font-weight:500;color:#3a2e28;}

.weekdays{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;margin-bottom:4px;}
.wd{text-align:center;font-size:11px;color:#b0a090;padding:4px 0;font-weight:600;letter-spacing:0.05em;}
.wd.sun{color:#c9614a;}.wd.sat{color:#7a9ab8;}

.cal{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-bottom:1.25rem;}
.day{
  border-radius:8px;min-height:52px;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  cursor:pointer;border:0.5px solid transparent;transition:all 0.15s;
  position:relative;overflow:hidden;user-select:none;
}
.day.empty{cursor:default;pointer-events:none;}
.day.open{background:#e8ddd4;border-color:#d4c4b4;}
.day.open:active{background:#d0c4b4;}
.day.closed{background:#ede8e2;border-color:#e4ddd6;}
.day.closed:active{background:#ddd8d0;}

.day.today.open .dn{
  background:#7a5c40;color:#f5f0eb !important;
  border-radius:50%;width:24px;height:24px;
  display:flex;align-items:center;justify-content:center;line-height:1;
}
.day.today.closed .dn{
  background:#c8beb4;color:#f5f0eb !important;
  border-radius:50%;width:24px;height:24px;
  display:flex;align-items:center;justify-content:center;line-height:1;
}

.dn{font-size:14px;font-weight:500;color:#3a2e28;text-align:center;line-height:1;}
.day.open .dn{color:#5a3e28;}
.day.closed .dn{color:#c8beb4;}
.day.empty .dn{color:transparent;}
.sun-num.open .dn{color:#c9614a !important;}
.sun-num.closed .dn{color:#e4b8ae !important;}

/* X for closed days */
.x-line{position:absolute;inset:6px;pointer-events:none;}
.day.open .x-line{display:none;}

.legend{display:flex;gap:16px;justify-content:center;margin-bottom:1.25rem;}
.leg{display:flex;align-items:center;gap:6px;font-size:12px;color:#9a8878;}
.leg-swatch{width:22px;height:22px;border-radius:5px;flex-shrink:0;position:relative;}
.leg-swatch.open{background:#e8ddd4;border:1px solid #d4c4b4;}
.leg-swatch.closed{background:#ede8e2;border:1px solid #e4ddd6;}
.leg-swatch.closed::before,.leg-swatch.closed::after{
  content:'';position:absolute;background:#c9614a;opacity:0.6;
  width:70%;height:1.5px;top:50%;left:15%;border-radius:1px;
}
.leg-swatch.closed::before{transform:rotate(38deg);}
.leg-swatch.closed::after{transform:rotate(-38deg);}

.hint{font-size:12px;color:#c8beb4;text-align:center;margin-bottom:1rem;}

.action-bar{display:flex;gap:8px;flex-direction:column;margin-bottom:1.25rem;}
.save-btn{
  width:100%;padding:13px;background:#3a2e28;color:#f5f0eb;
  border:none;border-radius:10px;font-size:15px;font-weight:500;
  cursor:pointer;transition:background 0.15s;
}
.save-btn:hover{background:#5a4838;}
.export-btn{
  width:100%;padding:12px;background:#f5f0eb;color:#3a2e28;
  border:0.5px solid #c8beb4;border-radius:10px;font-size:14px;font-weight:500;
  cursor:pointer;transition:all 0.15s;
  display:flex;align-items:center;justify-content:center;gap:6px;
}
.export-btn:hover{background:#ede8e2;}
.action-msg{font-size:12px;color:#7a5c40;text-align:center;min-height:18px;}
</style>
</head>
<body>
<div class="wrap">
  <div class="header">
    <div class="store-name">YQN Studio</div>
    <div class="store-sub">點選日期切換休假 / 營業</div>
  </div>

  <div class="nav">
    <button class="nav-btn" onclick="changeMonth(-1)">‹ 上月</button>
    <span class="month-label" id="monthLabel"></span>
    <button class="nav-btn" onclick="changeMonth(1)">下月 ›</button>
  </div>

  <div class="weekdays">
    <div class="wd sun">SUN</div><div class="wd">MON</div><div class="wd">TUE</div>
    <div class="wd">WED</div><div class="wd">THU</div><div class="wd">FRI</div>
    <div class="wd sat">SAT</div>
  </div>
  <div class="cal" id="cal"></div>

  <div class="legend">
    <div class="leg"><div class="leg-swatch open"></div>營業</div>
    <div class="leg"><div class="leg-swatch closed"></div>休假</div>
  </div>

  <p class="hint">點一下標記休假，再點一下取消</p>

  <div class="action-bar">
    <button class="save-btn" onclick="saveSchedule()">💾 儲存班表</button>
    <button class="export-btn" onclick="exportJPG()">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none" style="flex-shrink:0">
        <path d="M8 1v9M5 7l3 3 3-3M2 11v1a2 2 0 002 2h8a2 2 0 002-2v-1" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      產生班表圖片 4:5
    </button>
    <div class="action-msg" id="actionMsg"></div>
  </div>
</div>

<!-- Image preview overlay -->
<div id="previewOverlay" style="
  position:fixed;inset:0;background:rgba(58,46,40,0.85);
  display:none;flex-direction:column;align-items:center;justify-content:center;
  z-index:998;padding:20px;
">
  <p style="color:#f5f0eb;font-size:14px;margin-bottom:14px;text-align:center;line-height:1.8;">
    📱 長按圖片 → <strong>「加入照片」</strong><br>即可存到相簿
  </p>
  <img id="previewImg" style="width:100%;max-width:480px;border-radius:10px;display:block;box-shadow:0 8px 32px rgba(0,0,0,0.4);"/>
  <button onclick="document.getElementById('previewOverlay').style.display='none'" style="
    margin-top:20px;padding:12px 36px;background:#f5f0eb;color:#3a2e28;
    border:none;border-radius:10px;font-size:15px;font-weight:500;cursor:pointer;
  ">關閉</button>
</div>

<script>
const MONTHS_ZH = ['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];
const MONTHS_EN = ['JANUARY','FEBRUARY','MARCH','APRIL','MAY','JUNE','JULY','AUGUST','SEPTEMBER','OCTOBER','NOVEMBER','DECEMBER'];
const WD_SHORT  = ['SUN','MON','TUE','WED','THU','FRI','SAT'];

const now = new Date();
let curYear  = now.getFullYear();
let curMonth = now.getMonth();

// closedDays: Set of 'YYYY-M-D' strings that are marked as closed
let closedDays = new Set();
try{
  const s = localStorage.getItem('yqn_closed');
  if(s) closedDays = new Set(JSON.parse(s));
}catch(e){}

window.onload = () => renderCal();

function changeMonth(d){
  curMonth += d;
  if(curMonth > 11){ curMonth=0; curYear++; }
  if(curMonth < 0) { curMonth=11; curYear--; }
  renderCal();
}

function renderCal(){
  document.getElementById('monthLabel').textContent = `${curYear} 年 ${MONTHS_ZH[curMonth]}`;
  const cal = document.getElementById('cal');
  cal.innerHTML = '';
  const first   = new Date(curYear, curMonth, 1).getDay();
  const total   = new Date(curYear, curMonth+1, 0).getDate();
  const todayKey = `${now.getFullYear()}-${now.getMonth()}-${now.getDate()}`;

  for(let i=0; i<first; i++){
    const e = document.createElement('div');
    e.className = 'day empty';
    cal.appendChild(e);
  }

  for(let d=1; d<=total; d++){
    const dow    = new Date(curYear, curMonth, d).getDay();
    const key    = `${curYear}-${curMonth}-${d}`;
    const isClosed = closedDays.has(key);
    const isToday  = key === todayKey;

    const el  = document.createElement('div');
    let cls   = 'day ' + (isClosed ? 'closed' : 'open');
    if(isToday) cls += ' today';
    if(dow === 0) cls += ' sun-num';
    el.className = cls;

    const xSvg = isClosed
      ? `<svg class="x-line" viewBox="0 0 100 100" preserveAspectRatio="none">
          <line x1="12" y1="12" x2="88" y2="88" stroke="#c9614a" stroke-width="9" stroke-linecap="round" opacity="0.45"/>
          <line x1="88" y1="12" x2="12" y2="88" stroke="#c9614a" stroke-width="9" stroke-linecap="round" opacity="0.45"/>
        </svg>`
      : '';

    el.innerHTML = `<span class="dn">${d}</span>${xSvg}`;
    el.onclick = () => toggleDay(key);
    cal.appendChild(el);
  }
}

function toggleDay(key){
  if(closedDays.has(key)) closedDays.delete(key);
  else closedDays.add(key);
  renderCal();
}

function saveSchedule(){
  try{
    localStorage.setItem('yqn_closed', JSON.stringify([...closedDays]));
    showMsg('✓ 班表已儲存成功！');
  }catch(e){ showMsg('儲存失敗'); }
}

function showMsg(t){
  const el = document.getElementById('actionMsg');
  el.textContent = t;
  setTimeout(()=>el.textContent='', 3000);
}

// ── Export 4:5 JPG ────────────────────────────────────────
async function exportJPG(){
  await document.fonts.load(`600 66px 'Dancing Script'`);

  const DPR  = 2;
  const W    = 1080;
  const H    = 1350;
  const PAD_X = 60;
  const PAD_Y = 72;
  const HEADER_H  = 240;
  const DIVIDER_Y = PAD_Y + HEADER_H;
  const WD_BAR_H  = 58;
  const WD_Y0     = DIVIDER_Y + 1;
  const CAL_Y0    = WD_Y0 + WD_BAR_H;
  const CAL_H     = H - CAL_Y0 - PAD_Y - 48;

  const first = new Date(curYear, curMonth, 1).getDay();
  const total = new Date(curYear, curMonth+1, 0).getDate();
  const rows  = Math.ceil((first + total) / 7);

  const GRID_W  = W - PAD_X * 2;
  const COL_GAP = 2;
  const ROW_GAP = 2;
  const CELL_W  = Math.floor((GRID_W - COL_GAP * 6) / 7);
  const CELL_H  = Math.floor((CAL_H  - ROW_GAP * (rows-1)) / rows);

  const canvas = document.createElement('canvas');
  canvas.width  = W * DPR;
  canvas.height = H * DPR;
  const ctx = canvas.getContext('2d');
  ctx.scale(DPR, DPR);

  // background
  ctx.fillStyle = '#F2EBE3';
  ctx.fillRect(0, 0, W, H);
  ctx.fillStyle = '#EDE4DA';
  ctx.fillRect(0, 0, W, DIVIDER_Y);

  // YQN Studio handwriting
  ctx.textAlign = 'center';
  ctx.fillStyle = '#7a5c40';
  ctx.font = `600 66px 'Dancing Script',Georgia,cursive`;
  ctx.fillText('YQN Studio', W/2, PAD_Y + 62);

  // month
  ctx.textAlign = 'left';
  ctx.fillStyle = '#3a2e28';
  ctx.font = `300 125px Georgia,serif`;
  ctx.fillText(MONTHS_EN[curMonth], PAD_X - 6, PAD_Y + 200);

  // year
  ctx.textAlign = 'right';
  ctx.fillStyle = '#3a2e28';
  ctx.font = `300 90px Georgia,serif`;
  ctx.fillText(String(curYear), W - PAD_X, PAD_Y + 200);

  // divider
  ctx.strokeStyle = '#c8beb4';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(PAD_X, DIVIDER_Y);
  ctx.lineTo(W - PAD_X, DIVIDER_Y);
  ctx.stroke();

  // weekday labels
  for(let i=0; i<7; i++){
    const cx = PAD_X + i*(CELL_W + COL_GAP);
    ctx.textAlign = 'center';
    ctx.fillStyle = i===0 ? '#c9614a' : i===6 ? '#7a9ab8' : '#9a8878';
    ctx.font = `500 20px -apple-system,sans-serif`;
    ctx.fillText(WD_SHORT[i], cx + CELL_W/2, WD_Y0 + 40);
  }

  // cells
  for(let d=1; d<=total; d++){
    const idx      = first + d - 1;
    const col      = idx % 7;
    const row      = Math.floor(idx / 7);
    const dow      = new Date(curYear, curMonth, d).getDay();
    const key      = `${curYear}-${curMonth}-${d}`;
    const isClosed = closedDays.has(key);

    const cx = PAD_X + col*(CELL_W + COL_GAP);
    const cy = CAL_Y0 + row*(CELL_H + ROW_GAP);

    // cell bg
    ctx.fillStyle = isClosed ? '#EDE8E2' : '#E8DDD4';
    ctx.fillRect(cx, cy, CELL_W, CELL_H);
    ctx.strokeStyle = isClosed ? '#E0D8D0' : '#D4C4B4';
    ctx.lineWidth = 0.5;
    ctx.strokeRect(cx+0.25, cy+0.25, CELL_W-0.5, CELL_H-0.5);

    // day number
    ctx.textAlign = 'center';
    ctx.fillStyle = isClosed
      ? (dow===0 ? '#e4b0a4' : '#c8c0b8')
      : (dow===0 ? '#c9614a' : '#5a3e28');
    ctx.font = `${isClosed?300:400} 34px Georgia,serif`;
    ctx.fillText(d, cx + CELL_W/2, cy + CELL_H/2 + 12);

    // red X for closed
    if(isClosed){
      ctx.save();
      ctx.strokeStyle = '#c9614a';
      ctx.lineWidth = Math.max(2.5, CELL_W * 0.025);
      ctx.globalAlpha = 0.38;
      ctx.lineCap = 'round';
      const m = Math.min(CELL_W, CELL_H) * 0.18;
      ctx.beginPath();
      ctx.moveTo(cx+m, cy+m);
      ctx.lineTo(cx+CELL_W-m, cy+CELL_H-m);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(cx+CELL_W-m, cy+m);
      ctx.lineTo(cx+m, cy+CELL_H-m);
      ctx.stroke();
      ctx.restore();
    }
  }

  // footer
  ctx.textAlign = 'center';
  ctx.fillStyle = '#9a8878';
  ctx.font = `600 32px 'Dancing Script',Georgia,cursive`;
  ctx.fillText('YQN Studio', W/2, H - 30);

  // show preview
  document.getElementById('previewImg').src = canvas.toDataURL('image/jpeg', 0.95);
  document.getElementById('previewOverlay').style.display = 'flex';
}
</script>
</body>
</html>
